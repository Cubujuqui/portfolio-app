<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portfolio Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Portfolio" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --surface2:  #1c2437;
      --border:    #1e2d45;
      --accent:    #3b82f6;
      --alow:      rgba(59,130,246,.14);
      --green:     #10b981;
      --gbg:       rgba(16,185,129,.10);
      --red:       #ef4444;
      --rbg:       rgba(239,68,68,.10);
      --text:      #f1f5f9;
      --muted:     #64748b;
      --mono:      'SF Mono','Fira Code',ui-monospace,monospace;
      --sans:      -apple-system,BlinkMacSystemFont,'Inter',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      background:var(--bg);color:var(--text);
      font-family:var(--sans);min-height:100vh;
      padding-bottom:env(safe-area-inset-bottom,24px);
    }

    /* ─── HEADER ─── */
    header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:16px 16px 12px;
      position:sticky;top:0;z-index:200;
    }
    .h-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:.95rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent)}
    #notify-btn{
      background:none;border:1px solid var(--border);color:var(--muted);
      font-size:.65rem;padding:5px 9px;border-radius:6px;cursor:pointer;
      font-family:var(--mono);letter-spacing:.05em;white-space:nowrap;
    }
    #notify-btn.on{border-color:var(--green);color:var(--green)}

    /* ─── SETUP PANEL ─── */
    #setup{margin:16px 16px 8px}
    #run-btn{
      width:100%;background:var(--accent);color:#fff;border:none;
      padding:14px;border-radius:12px;font-size:.95rem;
      font-weight:700;cursor:pointer;font-family:var(--sans);letter-spacing:.04em;
    }
    #run-btn:disabled{opacity:.3;cursor:not-allowed}
    #run-btn:not(:disabled):active{transform:scale(.98)}

    /* ─── STATUS ─── */
    #status{
      margin:4px 16px 12px;font-size:.73rem;color:var(--muted);
      font-family:var(--mono);min-height:16px;text-align:center;
    }
    #status.err{color:var(--red)}
    #status.ok{color:var(--green)}

    /* ─── SUMMARY CARDS ─── */
    .sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:0 16px 16px}
    .sum-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:11px;padding:12px 13px;
    }
    .sum-card .lbl{font-size:.63rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
    .sum-card .val{font-size:1.15rem;font-weight:700;font-family:var(--mono)}
    .pos{color:var(--green)} .neg{color:var(--red)} .neu{color:var(--text)}

    /* ─── LOT TABLE ─── */
    .sec-lbl{margin:0 16px 8px;font-size:.65rem;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}

    .tbl-wrap{
      margin:0 6px 16px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      border:1px solid var(--border);border-radius:11px;
    }
    table{
      width:100%;border-collapse:collapse;
      font-family:var(--mono);font-size:.72rem;
      white-space:nowrap;
    }
    thead th{
      background:var(--surface2);color:var(--muted);
      font-weight:600;padding:8px 10px;
      text-align:left;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;
      position:sticky;top:0;
    }
    tbody tr{border-top:1px solid var(--border)}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    tbody td{padding:8px 10px;color:var(--text)}

    td.ticker{font-weight:700;font-size:.82rem;letter-spacing:.04em}
    td.num{text-align:right}
    td.neg-val{color:var(--red);text-align:right}
    td.pos-val{color:var(--green);text-align:right}

    /* ─── COPY BUTTON ─── */
    #copy-btn{
      display:none;width:calc(100% - 32px);margin:2px 16px 20px;
      background:none;border:1px solid var(--border);color:var(--muted);
      font-size:.75rem;padding:10px;border-radius:9px;
      cursor:pointer;font-family:var(--mono);letter-spacing:.04em;
    }

    /* ─── LOADING DOTS ─── */
    .dots::after{content:'';animation:d 1.2s steps(3,end) infinite}
    @keyframes d{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
  </style>
</head>
<body>

<header>
  <div class="h-row">
    <h1>📈 Portfolio</h1>
    <button id="notify-btn" onclick="requestNotify()">🔔 Enable Alerts</button>
  </div>
</header>

<!-- SETUP -->
<div id="setup">
  <button id="run-btn" onclick="runAnalysis()">Refresh &amp; Analyze</button>
</div>

<div id="status"></div>

<!-- RESULTS -->
<div id="results" style="display:none">
  <div class="sum-grid" id="sum-grid"></div>
  <div class="sec-lbl">All Lots — sorted by USD Variation ↓</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Purchase Date</th>
          <th style="text-align:right">Qty</th>
          <th style="text-align:right">Buy Price</th>
          <th style="text-align:right">Curr Price</th>
          <th style="text-align:right">USD Var</th>
          <th style="text-align:right">% Var</th>
        </tr>
      </thead>
      <tbody id="lot-tbody"></tbody>
    </table>
  </div>
  <button id="copy-btn" onclick="copyReport()">⎘ Copy Text Report</button>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────
const PORTFOLIO_URL = 'https://raw.githubusercontent.com/Cubujuqui/portfolio-app/main/Investing_Inventory_Investments.md';
const YAHOO         = 'https://query1.finance.yahoo.com/v8/finance/chart/';

// ─── INIT ─────────────────────────────────────────────────────
let lastRows = [];
let swReg    = null;

registerSW();

// ─── FILE SOURCE: GitHub raw ─────────────────────────────────

// ─── FETCH PORTFOLIO FROM GITHUB ─────────────────────────────
async function fetchMDFromDrive() {
  const res = await fetch(PORTFOLIO_URL + '?t=' + Date.now());
  if (!res.ok) throw new Error(`Could not load portfolio file (HTTP ${res.status}). Check your internet connection.`);
  const text = await res.text();
  if (!text.trim()) throw new Error('Portfolio file appears empty.');
  return text;
}

// ─── PARSE MD ────────────────────────────────────────────────
// Supports the format:
//   TICKER, Full Name          ← ticker header line
//   YYYY-MM-DD,qty,price       ← lot line
// Skips: Title:, Structure:, blank lines, and any line that
// looks like a ticker header with a trailing number (stray data).
function parseMD(text) {
  const port   = {};   // { TICKER: [ {date,qty,price,name}, … ] }
  const names  = {};   // { TICKER: "Full Name" }
  let cur = null;

  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;

    // Skip file-level meta lines
    if (/^(Title:|Structure:|Ticker|Purchase)/i.test(line)) continue;

    // ── Ticker header: "ICLN, iShares Global Clean Energy ETF"
    // Pattern: starts with 1-6 uppercase letters, then comma, then name text.
    // Guard: the part after the last comma must NOT look like a bare number
    // (which would mean it's a stray value on a ticker line, e.g. "ZTS, Zoetis Inc,78.17").
    const tickerMatch = line.match(/^([A-Z]{1,6}(?:\.[A-Z]{1,3})?)\s*,\s*(.+)$/);
    if (tickerMatch) {
      const ticker   = tickerMatch[1];
      const rest     = tickerMatch[2].trim();
      // Split rest on commas to see if there's a trailing number
      const restParts = rest.split(',').map(s => s.trim());
      const lastName  = restParts[restParts.length - 1];
      // If the last segment is a pure number, it's stray — still register the ticker
      // but ignore the stray number.
      const fullName = /^\d+(\.\d+)?$/.test(lastName)
        ? restParts.slice(0, -1).join(', ')
        : rest;
      cur = ticker;
      names[cur] = fullName;
      if (!port[cur]) port[cur] = [];
      continue;
    }

    // ── Lot line: "2025-03-24,1,11.68"
    if (cur) {
      const parts = line.split(',').map(s => s.trim());
      if (parts.length >= 3) {
        const date  = parseISO(parts[0]);
        const qty   = parseFloat(parts[1]);
        const price = parseFloat(parts[2]);
        if (date && qty > 0 && !isNaN(price) && price > 0) {
          port[cur].push({ date, qty, price, name: names[cur] ?? cur });
        }
      }
    }
  }

  // Remove tickers with no valid lots
  for (const t of Object.keys(port)) { if (!port[t].length) delete port[t]; }
  return port;
}

function parseISO(s) {
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? new Date(`${m[1]}-${m[2]}-${m[3]}T12:00:00`) : null;
}

// ─── YAHOO FINANCE ────────────────────────────────────────────
async function fetchQuote(ticker) {
  const res  = await fetch(`${YAHOO}${ticker}?interval=1d&range=5d`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const meta = data?.chart?.result?.[0]?.meta;
  if (!meta) throw new Error('No data');
  const price    = meta.regularMarketPrice ?? meta.chartPreviousClose;
  const prev     = meta.chartPreviousClose ?? meta.previousClose;
  const dayChg   = prev ? ((price - prev) / prev) * 100 : 0;
  return { price, dayChg, currency: meta.currency ?? 'USD', name: meta.shortName ?? ticker };
}

// ─── MAIN ─────────────────────────────────────────────────────
async function runAnalysis() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  document.getElementById('results').style.display = 'none';
  setStatus('<span class="dots">Loading portfolio</span>');

  let port;
  try {
    const md = await fetchMDFromDrive();
    port = parseMD(md);
    const n = Object.keys(port).length;
    if (!n) throw new Error('No tickers found — check your .md format.');
    setStatus(`<span class="dots">Fetching prices for ${n} tickers</span>`);
  } catch (e) {
    setStatus(e.message, 'err');
    btn.disabled = false;
    return;
  }

  const allLots  = [];
  const errors   = [];
  const tickers  = Object.keys(port);

  for (const ticker of tickers) {
    try {
      setStatus(`<span class="dots">Fetching ${ticker}</span>`);
      const q = await fetchQuote(ticker);
      for (const lot of port[ticker]) {
        const usdVar = (q.price - lot.price) * lot.qty;   // total $ variation for this lot
        const pctVar = ((q.price - lot.price) / lot.price) * 100;
        allLots.push({
          ticker,
          date:      lot.date,
          qty:       lot.qty,
          buyPrice:  lot.price,
          currPrice: q.price,
          usdVar,   // for sorting
          pctVar,
          dayChg:    q.dayChg,
          currency:  q.currency,
        });
      }
    } catch (e) {
      errors.push(`${ticker}: ${e.message}`);
    }
  }

  if (!allLots.length) {
    setStatus('All price fetches failed — check internet connection.', 'err');
    btn.disabled = false;
    return;
  }

  // Sort descending by USD variation
  allLots.sort((a, b) => b.usdVar - a.usdVar);
  lastRows = allLots;

  renderResults(allLots, errors);
  btn.disabled = false;

  const totalUSD = allLots.reduce((s, r) => s + r.usdVar, 0);
  sendNotification(allLots, totalUSD);
}

// ─── RENDER ───────────────────────────────────────────────────
function renderResults(rows, errors) {
  // Summary
  const totalCost  = rows.reduce((s, r) => s + r.buyPrice  * r.qty, 0);
  const totalVal   = rows.reduce((s, r) => s + r.currPrice * r.qty, 0);
  const totalUSD   = totalVal - totalCost;
  const totalPct   = (totalUSD / totalCost) * 100;
  const numLots    = rows.length;
  const tickers    = [...new Set(rows.map(r => r.ticker))].length;

  const grid = document.getElementById('sum-grid');
  grid.innerHTML = `
    <div class="sum-card">
      <div class="lbl">Cost Basis</div>
      <div class="val neu">$${fmt(totalCost)}</div>
    </div>
    <div class="sum-card">
      <div class="lbl">Market Value</div>
      <div class="val neu">$${fmt(totalVal)}</div>
    </div>
    <div class="sum-card">
      <div class="lbl">Unrealized P&L</div>
      <div class="val ${totalUSD >= 0 ? 'pos' : 'neg'}">${sign(totalUSD)}$${fmt(Math.abs(totalUSD))}</div>
    </div>
    <div class="sum-card">
      <div class="lbl">Total Return</div>
      <div class="val ${totalPct >= 0 ? 'pos' : 'neg'}">${sign(totalPct)}${totalPct.toFixed(2)}%</div>
    </div>
  `;

  // Table rows
  const tbody = document.getElementById('lot-tbody');
  tbody.innerHTML = rows.map(r => {
    const uCls = r.usdVar >= 0 ? 'pos-val' : 'neg-val';
    const pCls = r.pctVar >= 0 ? 'pos-val' : 'neg-val';
    return `<tr>
      <td class="ticker">${r.ticker}</td>
      <td>${fmtDate(r.date)}</td>
      <td class="num">${r.qty}</td>
      <td class="num">$${r.buyPrice.toFixed(2)}</td>
      <td class="num">$${r.currPrice.toFixed(2)}</td>
      <td class="${uCls}">${sign(r.usdVar)}$${fmt(Math.abs(r.usdVar))}</td>
      <td class="${pCls}">${sign(r.pctVar)}${r.pctVar.toFixed(2)}%</td>
    </tr>`;
  }).join('');

  if (errors.length) {
    tbody.innerHTML += `<tr><td colspan="7" style="color:var(--red);padding:10px;font-size:.7rem">⚠ ${errors.join(' · ')}</td></tr>`;
  }

  document.getElementById('copy-btn').style.display = 'block';
  document.getElementById('results').style.display   = 'block';
  setStatus(`✓ ${numLots} lots · ${tickers} tickers · updated ${new Date().toLocaleTimeString()}`, 'ok');
}

// ─── COPY REPORT ──────────────────────────────────────────────
function copyReport() {
  if (!lastRows.length) return;
  const now   = new Date().toLocaleString();
  const W     = [8, 12, 5, 11, 11, 12, 9];
  const H     = ['TICKER','PURCHASE DATE','QTY','BUY PRICE','CURR PRICE','USD VAR','% VAR'];
  const sep   = W.map(w => '─'.repeat(w)).join('─┼─');
  const hdr   = H.map((h,i) => h.padEnd(W[i])).join(' │ ');
  const lines = [
    `PORTFOLIO REPORT — ${now}`,
    '═'.repeat(sep.length + 6),
    hdr,
    sep,
    ...lastRows.map(r => [
      r.ticker.padEnd(W[0]),
      fmtDate(r.date).padEnd(W[1]),
      String(r.qty).padEnd(W[2]),
      `$${r.buyPrice.toFixed(2)}`.padEnd(W[3]),
      `$${r.currPrice.toFixed(2)}`.padEnd(W[4]),
      (`${sign(r.usdVar)}$${fmt(Math.abs(r.usdVar))}`).padEnd(W[5]),
      (`${sign(r.pctVar)}${r.pctVar.toFixed(2)}%`).padEnd(W[6]),
    ].join(' │ ')),
    sep,
  ];
  const totCost = lastRows.reduce((s,r) => s + r.buyPrice*r.qty, 0);
  const totVal  = lastRows.reduce((s,r) => s + r.currPrice*r.qty, 0);
  const totUSD  = totVal - totCost;
  const totPct  = (totUSD/totCost)*100;
  lines.push(`TOTAL  Cost: $${fmt(totCost)}  Value: $${fmt(totVal)}  P&L: ${sign(totUSD)}$${fmt(Math.abs(totUSD))} (${sign(totPct)}${totPct.toFixed(2)}%)`);

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '⎘ Copy Text Report', 2000);
  });
}

// ─── NOTIFICATIONS ────────────────────────────────────────────
async function registerSW() {
  if ('serviceWorker' in navigator) {
    swReg = await navigator.serviceWorker.register('sw.js').catch(() => null);
  }
}

async function requestNotify() {
  if (!('Notification' in window)) {
    alert('Install this app to your Home Screen (Safari → Share → Add to Home Screen) to enable notifications.');
    return;
  }
  const p   = await Notification.requestPermission();
  const btn = document.getElementById('notify-btn');
  if (p === 'granted') {
    btn.textContent = '🔔 Alerts ON'; btn.classList.add('on');
    notify('Portfolio Tracker', '✅ Alerts enabled — you\'ll be notified after each refresh.');
  } else {
    btn.textContent = '🔕 Blocked';
    alert('To allow: Settings → Safari → Notifications → Allow for this site.');
  }
}

function notify(title, body) {
  if (Notification.permission !== 'granted') return;
  if (swReg?.showNotification) {
    swReg.showNotification(title, { body, icon:'icons/icon-192.png', tag:'portfolio', renotify:true, vibrate:[180,80,180] });
  } else {
    new Notification(title, { body });
  }
}

function sendNotification(rows, totalUSD) {
  const top   = rows[0];
  const emoji = totalUSD >= 0 ? '📈' : '📉';
  notify('Portfolio Update',
    `${emoji} P&L: ${sign(totalUSD)}$${fmt(Math.abs(totalUSD))}\n` +
    `Top lot: ${top.ticker} ${sign(top.usdVar)}$${fmt(Math.abs(top.usdVar))} (${sign(top.pctVar)}${top.pctVar.toFixed(2)}%)`
  );
}

// ─── UTILS ────────────────────────────────────────────────────
function fmt(n)    { return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function sign(n)   { return n >= 0 ? '+' : '-'; }
function fmtDate(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.innerHTML = msg; el.className = cls;
}
</script>
</body>
</html>
